name: Deploy Preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minify files
        uses: nizarmah/auto-minify@v3
        with:
          directory: '.'
          overwrite: true

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site-${{ github.head_ref }}
          path: .
          retention-days: 5

      - name: Comment preview link
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            **Preview ready!**  
            Download the artifact "preview-site-${{ github.head_ref }}" from the workflow run below to test the changes locally.
            (Or wait for manual download link in comments.)
